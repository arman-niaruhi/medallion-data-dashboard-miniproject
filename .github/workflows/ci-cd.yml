name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-data-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dashboard dependencies
        run: pip install -r dashboard/requirements.txt

      - name: Build medallion data
        run: |
          python bronze/generate_bronze.py
          python silver/build_silver.py
          python gold/build_gold.py

      - name: Validate generated outputs
        run: |
          test -f data/bronze/sales_raw.csv
          test -f data/silver/sales_clean.csv
          test -f data/gold/dim_customer.csv
          test -f data/gold/dim_product.csv
          test -f data/gold/dim_date.csv
          test -f data/gold/fact_sales.csv

      - name: Smoke test Streamlit app imports
        run: python -c "import dashboard.app"

      - name: Commit generated data if changed
        run: |
          if git diff --quiet -- data/; then
            echo "No generated data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: refresh generated medallion data"
          git push
