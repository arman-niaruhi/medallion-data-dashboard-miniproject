name: Medallion Pipeline + Dashboard Update

on:
  push:
    branches:
      - main
    paths:
      - "bronze/**"
      - "silver/**"
      - "gold/**"
      - "dashboard/**"
      - ".github/workflows/update-medallion.yml"
  workflow_dispatch:

jobs:
  bronze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build bronze image
        run: docker build -t medallion-bronze ./bronze

      - name: Run bronze container
        run: docker run --rm -v "$PWD/data:/data" medallion-bronze

      - name: Validate bronze output
        run: test -f data/bronze/sales_raw.csv

      - name: Upload bronze output
        uses: actions/upload-artifact@v4
        with:
          name: bronze-data
          path: data/bronze/
          if-no-files-found: error

  silver:
    runs-on: ubuntu-latest
    needs: bronze

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download bronze output
        uses: actions/download-artifact@v4
        with:
          name: bronze-data
          path: data/bronze/

      - name: Build silver image
        run: docker build -t medallion-silver ./silver

      - name: Run silver container
        run: docker run --rm -v "$PWD/data:/data" medallion-silver

      - name: Validate silver output
        run: test -f data/silver/sales_clean.csv

      - name: Upload silver output
        uses: actions/upload-artifact@v4
        with:
          name: silver-data
          path: data/silver/
          if-no-files-found: error

  gold:
    runs-on: ubuntu-latest
    needs: silver
    permissions:
      contents: write

    # 🔴 prevents infinite loop when bot pushes
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bronze output
        uses: actions/download-artifact@v4
        with:
          name: bronze-data
          path: data/bronze/

      - name: Download silver output
        uses: actions/download-artifact@v4
        with:
          name: silver-data
          path: data/silver/

      - name: Build gold image
        run: docker build -t medallion-gold ./gold

      - name: Run gold container
        run: docker run --rm -v "$PWD/data:/data" medallion-gold

      - name: Validate gold output
        run: |
          test -f data/gold/dim_customer.csv
          test -f data/gold/dim_product.csv
          test -f data/gold/dim_date.csv
          test -f data/gold/fact_sales.csv

      - name: Upload gold output
        uses: actions/upload-artifact@v4
        with:
          name: gold-data
          path: data/gold/
          if-no-files-found: error

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dashboard dependencies
        run: pip install -r dashboard/requirements.txt

      - name: Validate generated outputs
        run: |
          test -f data/bronze/sales_raw.csv
          test -f data/silver/sales_clean.csv
          test -f data/gold/dim_customer.csv
          test -f data/gold/dim_product.csv
          test -f data/gold/dim_date.csv
          test -f data/gold/fact_sales.csv

      - name: Smoke test Streamlit app imports
        run: python -c "import dashboard.app"

      - name: Commit updated data (triggers dashboard refresh)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/bronze data/silver data/gold
          git diff --cached --quiet || git commit -m "Update medallion outputs [skip ci]"
          git push
